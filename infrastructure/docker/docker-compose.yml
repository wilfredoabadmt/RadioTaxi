version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: radiotaxi
      POSTGRES_PASSWORD: radiotaxi
      POSTGRES_DB: radiotaxi
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build: ../../services/api
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://radiotaxi:radiotaxi@postgres:5432/radiotaxi
    ports:
      - '3000:3000'
    command: npm run start

volumes:
  postgres-data: {}
